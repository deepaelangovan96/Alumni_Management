{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg">

            <div class="card-header bg-primary text-white text-center">

                <h3>🔐 Alumni Login</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>Email Address</label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               placeholder="Enter Email"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>Password</label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter Password"
                               required>

                    </div>

                    <div class="d-grid">

                        <button class="btn btn-primary">
                            Login
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
